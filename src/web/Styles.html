<style>
  :root {
    --bg-top: #f6efe6;
    --bg-bottom: #efe4d5;
    --panel: rgba(255, 252, 247, 0.92);
    --panel-strong: #fffaf3;
    --line: rgba(110, 83, 55, 0.16);
    --ink: #2b2118;
    --muted: #6c5744;
    --accent: #b85c38;
    --accent-strong: #8d4022;
    --user-bubble: #2f6f5e;
    --user-ink: #f6fff9;
    --assistant-bubble: #fdf7ee;
    --system-bubble: #ede3d5;
    --danger: #9d2f2f;
    --danger-bg: #fff0ef;
    --warn: #9a5b11;
    --warn-bg: #fff5e6;
    --ok: #1c6a4b;
    --ok-bg: #edf9f2;
    --shadow: 0 20px 45px rgba(82, 52, 27, 0.12);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
    --safe-bottom: max(16px, env(safe-area-inset-bottom));
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 34%),
      linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
  }

  body {
    min-height: 100vh;
  }

  button,
  textarea,
  input {
    font: inherit;
  }

  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 18px 14px calc(var(--safe-bottom) + 8px);
  }

  .topbar,
  .status-panel,
  .chat-panel,
  .composer-shell {
    width: min(880px, 100%);
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .eyebrow {
    margin: 0 0 4px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .title {
    margin: 0;
    font-size: clamp(24px, 4vw, 38px);
    line-height: 1;
  }

  .status-panel,
  .chat-panel,
  .composer-shell {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .status-panel {
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }

  .status-panel[data-state="failed"] {
    background: var(--danger-bg);
    color: var(--danger);
  }

  .status-panel[data-state="retryable-failure"] {
    background: var(--warn-bg);
    color: var(--warn);
  }

  .status-panel[data-state="succeeded"] {
    background: var(--ok-bg);
    color: var(--ok);
  }

  .status-panel[data-state="not-configured"] {
    background: var(--warn-bg);
    color: var(--warn);
  }

  .status-label,
  .status-text {
    display: block;
  }

  .status-label {
    margin-bottom: 4px;
  }

  .status-text {
    margin: 0;
    white-space: pre-wrap;
  }

  .chat-panel {
    border-radius: var(--radius-xl);
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 45vh;
  }

  .history-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 4px 4px 10px;
  }

  .history-note {
    color: var(--muted);
    font-size: 13px;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    padding: 6px;
  }

  .message-row {
    display: flex;
  }

  .message-row[data-role="user"] {
    justify-content: flex-end;
  }

  .message-row[data-role="assistant"],
  .message-row[data-role="system"] {
    justify-content: flex-start;
  }

  .bubble {
    width: min(82%, 680px);
    border-radius: 22px;
    padding: 14px 16px;
    border: 1px solid transparent;
  }

  .message-row[data-role="user"] .bubble {
    background: var(--user-bubble);
    color: var(--user-ink);
  }

  .message-row[data-role="assistant"] .bubble {
    background: var(--assistant-bubble);
    border-color: rgba(110, 83, 55, 0.1);
  }

  .message-row[data-role="system"] .bubble {
    background: var(--system-bubble);
    border-color: rgba(110, 83, 55, 0.1);
  }

  .bubble-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 12px;
    opacity: 0.82;
  }

  .bubble-text {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }

  .bubble-image-meta {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.18);
    font-size: 13px;
  }

  .message-row[data-role="assistant"] .bubble-image-meta,
  .message-row[data-role="system"] .bubble-image-meta {
    border-top-color: rgba(110, 83, 55, 0.12);
  }

  .composer-shell {
    border-radius: var(--radius-xl);
    padding: 12px;
    position: sticky;
    bottom: 8px;
  }

  .composer {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message-input {
    width: 100%;
    min-height: 52px;
    max-height: 180px;
    resize: vertical;
    border-radius: var(--radius-lg);
    border: 1px solid var(--line);
    padding: 14px 16px;
    background: var(--panel-strong);
    color: var(--ink);
  }

  .attachment-row,
  .composer-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .attach-button,
  .ghost-button,
  .send-button {
    appearance: none;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
  }

  .attach-button,
  .ghost-button {
    background: transparent;
    color: var(--accent-strong);
    border: 1px solid rgba(184, 92, 56, 0.22);
    padding: 10px 14px;
  }

  .send-button {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #fff9f4;
    padding: 12px 18px;
    min-width: 110px;
    box-shadow: 0 14px 22px rgba(184, 92, 56, 0.24);
  }

  .attach-button:hover,
  .ghost-button:hover,
  .send-button:hover {
    transform: translateY(-1px);
  }

  .attach-button:disabled,
  .ghost-button:disabled,
  .send-button:disabled,
  .message-input:disabled {
    cursor: default;
    opacity: 0.6;
    transform: none;
  }

  .attachment-meta,
  .helper-text {
    color: var(--muted);
    font-size: 13px;
  }

  .preview-card {
    display: grid;
    grid-template-columns: 88px 1fr auto;
    gap: 12px;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 10px;
    background: rgba(255, 250, 243, 0.8);
  }

  .preview-image {
    width: 88px;
    height: 88px;
    object-fit: cover;
    border-radius: 12px;
    background: #eadbc9;
  }

  .preview-name,
  .preview-size {
    margin: 0;
  }

  .preview-name {
    font-weight: 600;
  }

  .preview-size {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .hidden {
    display: none;
  }

  @media (max-width: 720px) {
    .app-shell {
      padding: 12px 10px calc(var(--safe-bottom) + 8px);
    }

    .chat-panel {
      min-height: 50vh;
    }

    .bubble {
      width: 100%;
    }

    .preview-card {
      grid-template-columns: 72px 1fr;
    }

    .preview-card .ghost-button {
      grid-column: 1 / -1;
      justify-self: start;
    }

    .composer-shell {
      bottom: 2px;
    }
  }
</style>
